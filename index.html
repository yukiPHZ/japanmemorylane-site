<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Memory Lane</title>

  <meta name="description" content="Quiet moments in Japan." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f6f7f9;
      color: #111;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        sans-serif;

      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 100vh;
      padding: 40px;
    }

    .wrap {
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 32px;
    }

    p {
      margin: 0;
      line-height: 1.9;
      font-size: 16px;
      color: #444;
    }

    .coming {
      margin-top: 48px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Japan Memory Lane</h1>

    <p>
      Quiet moments in Japan.<br />
      Small streets, old shrines,<br />
      rainy evenings, local memories.
    </p>

    <p class="coming">
      Coming someday.
    </p>
  </div>
</body>
</html>
